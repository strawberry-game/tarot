<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>タロット占い - フル78枚対応</title>
  <style>
    :root{
      --bg1:#0d1324;
      --bg2:#1b2743;
      --panel:rgba(12,18,34,0.84);
      --line:rgba(241,220,156,0.28);
      --gold:#e6c979;
      --gold-soft:#f6ebbf;
      --text:#f8f3e6;
      --sub:#d6cfbf;
      --shadow:0 16px 44px rgba(0,0,0,0.35);
    }

    *{ box-sizing:border-box; }
    body{
      margin:0;
      min-height:100vh;
      color:var(--text);
      font-family:"Hiragino Sans","Yu Gothic","Meiryo",sans-serif;
      background:
        radial-gradient(circle at top, rgba(99,115,255,0.18), transparent 36%),
        radial-gradient(circle at 20% 20%, rgba(255,255,255,0.08), transparent 18%),
        linear-gradient(180deg, var(--bg2), var(--bg1));
      display:flex;
      flex-direction:column;
      overflow-x:hidden;
    }

    .stars,
    .stars::before,
    .stars::after{
      position:fixed;
      inset:0;
      content:"";
      pointer-events:none;
      background-image:
        radial-gradient(2px 2px at 12% 22%, rgba(255,255,255,0.8), transparent 60%),
        radial-gradient(1.5px 1.5px at 44% 12%, rgba(255,255,255,0.75), transparent 60%),
        radial-gradient(2px 2px at 75% 28%, rgba(255,255,255,0.65), transparent 60%),
        radial-gradient(1.5px 1.5px at 86% 65%, rgba(255,255,255,0.7), transparent 60%),
        radial-gradient(2px 2px at 30% 76%, rgba(255,255,255,0.6), transparent 60%),
        radial-gradient(1.5px 1.5px at 62% 82%, rgba(255,255,255,0.75), transparent 60%);
      animation: twinkle 5.5s linear infinite;
      opacity:.85;
    }
    .stars::before{ animation-duration:8s; opacity:.45; }
    .stars::after{ animation-duration:11s; opacity:.25; }
    @keyframes twinkle{
      0%,100%{ transform:translateY(0); opacity:.8; }
      50%{ transform:translateY(-6px); opacity:1; }
    }

    .wrap{
      position:relative;
      z-index:1;
      width:min(1120px, calc(100% - 32px));
      margin:0 auto;
      padding:32px 0 56px;
      flex:1 0 auto;
    }

    .hero{
      text-align:center;
      padding:34px 20px 24px;
      margin-bottom:24px;
      background:linear-gradient(180deg, rgba(20,29,53,0.82), rgba(10,15,28,0.75));
      border:1px solid var(--line);
      border-radius:28px;
      box-shadow:var(--shadow);
      backdrop-filter: blur(10px);
    }

    .hero h1{
      margin:0 0 10px;
      font-size:clamp(30px, 4vw, 46px);
      letter-spacing:.06em;
      color:#fff8e2;
    }

    .hero p{
      margin:0 auto;
      max-width:780px;
      line-height:1.9;
      color:var(--sub);
      font-size:15px;
    }

    .hero .subinfo{
      margin-top:10px;
      font-size:13px;
      color:#e8ddb5;
      letter-spacing:.04em;
    }

    .action-area{
      display:flex;
      justify-content:center;
      margin:28px 0 22px;
    }

    .draw-btn{
      border:none;
      cursor:pointer;
      padding:16px 28px;
      min-width:280px;
      border-radius:999px;
      font-size:18px;
      font-weight:700;
      color:#23180b;
      background:linear-gradient(135deg, #fff0bd 0%, #efcf76 50%, #d9b35b 100%);
      box-shadow:0 10px 28px rgba(0,0,0,0.28);
      transition:transform .18s ease, box-shadow .18s ease, filter .18s ease;
    }

    .draw-btn:hover{
      transform:translateY(-2px);
      box-shadow:0 14px 30px rgba(0,0,0,0.35);
      filter:brightness(1.03);
    }

    .draw-btn:disabled{
      cursor:wait;
      opacity:.7;
      transform:none;
    }

    .status{
      text-align:center;
      min-height:28px;
      font-size:14px;
      color:#efe3bb;
      margin-bottom:24px;
      letter-spacing:.04em;
    }

    .shuffle-panel{
      position:relative;
      height:310px;
      margin:0 auto 26px;
      width:min(900px, 100%);
      display:none;
      align-items:center;
      justify-content:center;
      overflow:hidden;
      border-radius:28px;
      border:1px solid var(--line);
      background:linear-gradient(180deg, rgba(11,17,31,0.8), rgba(18,26,48,0.85));
      box-shadow:var(--shadow);
    }

    .shuffle-panel.active{
      display:flex;
    }

    .shuffle-stage{
      position:relative;
      width:360px;
      height:230px;
    }

    .deck-card{
      position:absolute;
      left:50%;
      top:50%;
      width:130px;
      height:210px;
      border-radius:16px;
      border:2px solid rgba(245,223,159,0.85);
      background:
        radial-gradient(circle at 50% 42%, rgba(240,220,156,.25), transparent 22%),
        linear-gradient(180deg, #1e2b4c, #0f172c);
      box-shadow:0 16px 24px rgba(0,0,0,0.34);
      transform:translate(-50%, -50%);
      overflow:hidden;
    }

    .deck-card::before{
      content:"";
      position:absolute;
      inset:12px;
      border-radius:12px;
      border:1px solid rgba(244,227,178,0.55);
    }

    .deck-card::after{
      content:"✦";
      position:absolute;
      left:50%;
      top:50%;
      transform:translate(-50%, -50%);
      color:#f4de9c;
      font-size:46px;
      text-shadow:0 0 12px rgba(255,241,194,.35);
    }

    .deck-card.card1{ animation:shuffle1 1.1s ease-in-out infinite; }
    .deck-card.card2{ animation:shuffle2 1.1s ease-in-out infinite; }
    .deck-card.card3{ animation:shuffle3 1.1s ease-in-out infinite; }

    @keyframes shuffle1{
      0%,100%{ transform:translate(-50%, -50%) rotate(0deg); }
      25%{ transform:translate(-92%, -44%) rotate(-13deg); }
      50%{ transform:translate(-36%, -58%) rotate(10deg); }
      75%{ transform:translate(-72%, -48%) rotate(-6deg); }
    }
    @keyframes shuffle2{
      0%,100%{ transform:translate(-50%, -50%) rotate(4deg); }
      25%{ transform:translate(-18%, -62%) rotate(15deg); }
      50%{ transform:translate(-68%, -39%) rotate(-14deg); }
      75%{ transform:translate(-45%, -55%) rotate(6deg); }
    }
    @keyframes shuffle3{
      0%,100%{ transform:translate(-50%, -50%) rotate(-3deg); }
      25%{ transform:translate(-58%, -31%) rotate(10deg); }
      50%{ transform:translate(-26%, -52%) rotate(-11deg); }
      75%{ transform:translate(-80%, -61%) rotate(14deg); }
    }

    .shuffle-text{
      position:absolute;
      bottom:24px;
      left:50%;
      transform:translateX(-50%);
      font-size:15px;
      color:#f0e0ad;
      letter-spacing:.14em;
      text-align:center;
      line-height:1.7;
    }

    .results{
      display:grid;
      grid-template-columns:repeat(3, minmax(0, 1fr));
      gap:18px;
      align-items:start;
    }

    .card-result{
      background:linear-gradient(180deg, rgba(24,32,58,0.9), rgba(12,18,34,0.88));
      border:1px solid var(--line);
      border-radius:24px;
      padding:18px;
      box-shadow:var(--shadow);
      min-height:100%;
    }

    .position-badge{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:6px 12px;
      border-radius:999px;
      background:rgba(241,220,156,0.12);
      border:1px solid rgba(241,220,156,0.24);
      color:#f7e7b8;
      font-size:12px;
      letter-spacing:.08em;
      margin-bottom:14px;
    }

    .tarot-image{
      width:100%;
      aspect-ratio:3 / 5;
      object-fit:cover;
      border-radius:18px;
      border:1px solid rgba(244,227,178,0.3);
      background:#0d1324;
      display:block;
      box-shadow:0 8px 24px rgba(0,0,0,0.26);
    }

    .card-title{
      margin:14px 0 4px;
      font-size:24px;
      color:#fff6dc;
      letter-spacing:.04em;
    }

    .card-meta{
      font-size:13px;
      color:#d8cfba;
      line-height:1.7;
      margin-bottom:10px;
    }

    .orientation{
      font-size:13px;
      color:#e7d7a2;
      margin-bottom:14px;
    }

    .block{
      margin-top:12px;
      padding:14px 14px 12px;
      border-radius:16px;
      background:rgba(255,255,255,0.04);
      border:1px solid rgba(255,255,255,0.06);
    }

    .block-label{
      font-size:12px;
      color:#d9cfae;
      letter-spacing:.08em;
      margin-bottom:8px;
    }

    .block p{
      margin:0;
      line-height:1.85;
      color:#f5f1e4;
      font-size:14px;
    }

    .lucky{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      margin-top:12px;
    }

    .lucky .block{
      margin-top:0;
    }

    .summary{
      margin-top:24px;
      padding:22px;
      border-radius:24px;
      background:linear-gradient(180deg, rgba(30,41,74,0.95), rgba(12,18,34,0.92));
      border:1px solid var(--line);
      box-shadow:var(--shadow);
    }

    .summary h2{
      margin:0 0 10px;
      font-size:22px;
      color:#fff0c8;
    }

    .summary p{
      margin:0;
      line-height:1.9;
      color:#f0ead7;
    }

    .note{
      margin-top:16px;
      color:#cfc6b1;
      font-size:13px;
      line-height:1.8;
    }

    .site-footer{
      width:100%;
      margin-top:40px;
      text-align:center;
      padding:20px 16px;
      font-size:12px;
      color:#bfb7a4;
      background:rgba(2,6,23,0.7);
      border-top:1px solid rgba(255,255,255,0.1);
      letter-spacing:0.08em;
    }

    .hidden{
      display:none !important;
    }

    @media (max-width: 980px){
      .results{
        grid-template-columns:1fr;
      }
      .shuffle-panel{
        height:280px;
      }
    }

    @media (max-width: 600px){
      .wrap{
        width:min(100% - 20px, 100%);
        padding-top:20px;
      }
      .hero{
        padding:24px 16px 20px;
        border-radius:22px;
      }
      .draw-btn{
        width:100%;
        min-width:0;
      }
      .shuffle-stage{
        transform:scale(.92);
      }
      .lucky{
        grid-template-columns:1fr;
      }
    }
  </style>
</head>
<body>
  <div class="stars"></div>

  <div class="wrap">
    <section class="hero">
      <h1>タロット占い</h1>
      <p>
        フル78枚対応のデッキから、過去・現在・未来の3枚を引く占いです。<br>
        大アルカナ22枚に加え、小アルカナ56枚も含めてランダムに表示されます。
      </p>
      <div class="subinfo">大アルカナ 22枚 / 小アルカナ 56枚 / 合計 78枚</div>
    </section>

    <div class="action-area">
      <button id="drawBtn" class="draw-btn" onclick="startReading()">3枚のカードを引く</button>
    </div>

    <div id="status" class="status"></div>

    <section id="shufflePanel" class="shuffle-panel hidden">
      <div class="shuffle-stage">
        <div class="deck-card card1"></div>
        <div class="deck-card card2"></div>
        <div class="deck-card card3"></div>
      </div>
      <div id="shuffleText" class="shuffle-text">78枚のカードをシャッフルしています...</div>
    </section>

    <section id="resultSection" class="hidden">
      <div id="results" class="results"></div>

      <div id="summary" class="summary hidden">
        <h2>今回の全体メッセージ</h2>
        <p id="summaryText"></p>
        <div class="note">
          ※ 占い結果はスプレッドシートにも記録されます。<br>
          ※ カード画像は外部ファイルではなく、Apps Script側でカード風SVGを自動生成しています。
        </div>
      </div>
    </section>

  </div>

  <footer class="site-footer">
    © 2026 STRAWBERRY ALL RIGHTS RESERVED.
  </footer>

  <script>
    let shuffleDotsTimer = null;

    function startReading() {
      const btn = document.getElementById('drawBtn');
      const status = document.getElementById('status');
      const panel = document.getElementById('shufflePanel');
      const resultSection = document.getElementById('resultSection');
      const summary = document.getElementById('summary');

      btn.disabled = true;
      status.textContent = '78枚の中から運命の流れを読み取っています…';
      resultSection.classList.add('hidden');
      summary.classList.add('hidden');
      panel.classList.remove('hidden');
      panel.classList.add('active');

      startShuffleDots();

      google.script.run
        .withSuccessHandler(function(result) {
          window.setTimeout(function() {
            stopShuffleDots();
            panel.classList.add('hidden');
            panel.classList.remove('active');
            renderResult(result);
            btn.disabled = false;
            status.textContent = 'カードが開かれました。';
          }, 2200);
        })
        .withFailureHandler(function(error) {
          stopShuffleDots();
          panel.classList.add('hidden');
          panel.classList.remove('active');
          btn.disabled = false;
          status.textContent = '占い結果の取得に失敗しました。';
          alert('エラーが発生しました。もう一度お試しください。\n\n' + (error && error.message ? error.message : error));
        })
        .drawTarotSpread();
    }

    function startShuffleDots() {
      const text = document.getElementById('shuffleText');
      let step = 0;
      text.textContent = '78枚のカードをシャッフルしています';
      shuffleDotsTimer = window.setInterval(function() {
        step = (step + 1) % 4;
        text.textContent = '78枚のカードをシャッフルしています' + '.'.repeat(step);
      }, 280);
    }

    function stopShuffleDots() {
      if (shuffleDotsTimer) {
        clearInterval(shuffleDotsTimer);
        shuffleDotsTimer = null;
      }
    }

    function renderResult(result) {
      const container = document.getElementById('results');
      const section = document.getElementById('resultSection');
      const summary = document.getElementById('summary');
      const summaryText = document.getElementById('summaryText');

      container.innerHTML = '';

      result.cards.forEach(function(card) {
        const metaText = card.arcana + (card.suit ? ' / ' + card.suit : '') + (card.rank ? ' / ' + card.rank : '');

        const el = document.createElement('article');
        el.className = 'card-result';
        el.innerHTML =
          '<div class="position-badge">✦ ' + escapeHtml(card.positionLabel) + '</div>' +
          '<img class="tarot-image" src="' + card.imageUrl + '" alt="' + escapeHtml(card.name) + '">' +
          '<h3 class="card-title">' + escapeHtml(card.name) + '</h3>' +
          '<div class="card-meta">' + escapeHtml(metaText) + '</div>' +
          '<div class="orientation">' + escapeHtml(card.orientationLabel) + '</div>' +
          '<div class="block">' +
            '<div class="block-label">意味</div>' +
            '<p>' + escapeHtml(card.message) + '</p>' +
          '</div>' +
          '<div class="block">' +
            '<div class="block-label">アドバイス</div>' +
            '<p>' + escapeHtml(card.advice) + '</p>' +
          '</div>' +
          '<div class="lucky">' +
            '<div class="block">' +
              '<div class="block-label">ラッキーカラー</div>' +
              '<p>' + escapeHtml(card.luckyColor) + '</p>' +
            '</div>' +
            '<div class="block">' +
              '<div class="block-label">ラッキーアイテム</div>' +
              '<p>' + escapeHtml(card.luckyItem) + '</p>' +
            '</div>' +
          '</div>';
        container.appendChild(el);
      });

      summaryText.textContent = result.theme + '（記録日時: ' + result.drawnAt + '）';
      section.classList.remove('hidden');
      summary.classList.remove('hidden');
      section.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function escapeHtml(text) {
      return String(text)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }
  </script>
</body>
</html>
